<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Layer · USESI</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --teal: #4ecdc4;
      --white: #f5f5f0;
      --muted: #666;
      --border: rgba(255,255,255,0.08);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ── SPLASH ── */
    .splash {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px;
      position: relative;
    }

    /* subtle grid texture */
    .splash::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(78,205,196,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(78,205,196,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 32px;
      opacity: 0;
      animation: fade-up 0.8s ease 0.3s forwards;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(42px, 7vw, 86px);
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 48px;
      opacity: 0;
      animation: fade-up 0.8s ease 0.6s forwards;
    }

    h1 .teal { color: var(--teal); }

    .btn {
      display: inline-block;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--bg);
      background: var(--teal);
      padding: 16px 48px;
      transition: opacity 0.2s;
      opacity: 0;
      animation: fade-up 0.8s ease 1s forwards;
    }

    .btn:hover { opacity: 0.85; }

    .from {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
      opacity: 0;
      animation: fade-up 0.8s ease 1.3s forwards;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .splash { padding: 32px 24px; }
      h1 { font-size: 38px; }
    }
  </style>
</head>
<body>

  <div class="splash">
    <div class="eyebrow">For Lara · USESI</div>
    <h1>The layer<br/><span class="teal">USESI is missing.</span></h1>
    <a href="letter.html" class="btn">Read the note</a>
    <div class="from">A note from Micaila Vaughn</div>
  </div>

</body>
</html>
